version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN}
      - PRINTIFY_SHOP_ID=${PRINTIFY_SHOP_ID}
      - PRINTIFY_TOKEN=${PRINTIFY_TOKEN}
      - ETSY_API_KEY=${ETSY_API_KEY}
      - ETSY_SECRET=${ETSY_SECRET}
      - ETSY_ACCESS_TOKEN=${ETSY_ACCESS_TOKEN}
      - ETSY_REFRESH_TOKEN=${ETSY_REFRESH_TOKEN}
      - FIVERR_ACCESS_TOKEN=${FIVERR_ACCESS_TOKEN}
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - generated_assets:/app/generated

  celery-worker:
    build: ./backend
    command: celery -A workers.celery_app worker -l info -c 4
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN}
      - PRINTIFY_SHOP_ID=${PRINTIFY_SHOP_ID}
      - PRINTIFY_TOKEN=${PRINTIFY_TOKEN}
      - ETSY_API_KEY=${ETSY_API_KEY}
      - ETSY_SECRET=${ETSY_SECRET}
      - ETSY_ACCESS_TOKEN=${ETSY_ACCESS_TOKEN}
      - ETSY_REFRESH_TOKEN=${ETSY_REFRESH_TOKEN}
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - generated_assets:/app/generated

  celery-beat:
    build: ./backend
    command: celery -A workers.celery_app beat -l info
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  generated_assets:
